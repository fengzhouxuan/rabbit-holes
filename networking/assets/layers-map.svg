<svg width="100%" viewBox="0 0 680 366" role="img" xmlns="http://www.w3.org/2000/svg">
<title>HTTP、TCP、UDP、socket 的层次与维度定位</title>
<desc>从上到下：你的程序在最顶层；其下是应用层协议 HTTP / WebSocket，规定数据格式；再下是 socket 套接字，是操作系统提供的网络接口而非协议；再下是传输层的 TCP 与 UDP 两种运输方式，TCP 可靠有序、UDP 快但不保证；最底层是 IP / 网络，负责逐跳送达。左侧标注每层的角色：你写的程序、协议、接口、协议、网络。</desc>
<style>
svg{--color-text-primary:#1f2328;--color-text-secondary:#57606a;--color-border-secondary:#d0d7de;--color-text-info:#0969da;}
text{font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;}
.th{font-size:14px;font-weight:600;fill:#1f2328;}.ts{font-size:11px;fill:#57606a;}.t{font-size:13px;fill:#1f2328;}
.c-teal rect{fill:#d7f3ee;stroke:#0d9488;}.c-teal text{fill:#0f766e;}
.c-blue rect{fill:#dbeafe;stroke:#3b82f6;}.c-blue text{fill:#1d4ed8;}
.c-amber rect{fill:#fef3c7;stroke:#d97706;}.c-amber text{fill:#b45309;}
.c-purple rect{fill:#ede9fe;stroke:#8b5cf6;}.c-purple text{fill:#6d28d9;}
.c-gray rect{fill:#eef1f4;stroke:#9aa4af;}.c-gray text{fill:#3a424b;}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="366" fill="#ffffff"/>
<text class="ts" x="124" y="70" text-anchor="end">你写的</text>
<text class="ts" x="124" y="130" text-anchor="end">协议</text>
<text class="ts" x="124" y="196" text-anchor="end">接口</text>
<text class="ts" x="124" y="264" text-anchor="end">协议</text>
<text class="ts" x="124" y="328" text-anchor="end">网络</text>
<g class="c-teal">
<rect x="140" y="44" width="400" height="42" rx="10" stroke-width="0.5"/>
<text class="th" x="340" y="64" text-anchor="middle">你的程序</text>
<text class="ts" x="340" y="79" text-anchor="middle">浏览器 / curl / Jenkins</text>
</g>
<line x1="340" y1="87" x2="340" y2="99" stroke="var(--color-text-secondary)" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<g class="c-blue">
<rect x="140" y="100" width="400" height="52" rx="10" stroke-width="0.5"/>
<text class="th" x="340" y="122" text-anchor="middle">HTTP / WebSocket 等</text>
<text class="ts" x="340" y="139" text-anchor="middle">应用层协议：规定「数据长什么格式」</text>
</g>
<line x1="340" y1="153" x2="340" y2="165" stroke="var(--color-text-secondary)" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<g class="c-purple">
<rect x="140" y="166" width="400" height="52" rx="10" stroke-width="0.5"/>
<text class="th" x="340" y="188" text-anchor="middle">socket（套接字）</text>
<text class="ts" x="340" y="205" text-anchor="middle">操作系统给的「网络插口」= 接口，不是协议</text>
</g>
<line x1="340" y1="219" x2="340" y2="231" stroke="var(--color-text-secondary)" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<g class="c-amber">
<rect x="140" y="232" width="193" height="56" rx="10" stroke-width="0.5"/>
<text class="th" x="236" y="256" text-anchor="middle">TCP</text>
<text class="ts" x="236" y="273" text-anchor="middle">可靠有序 · 挂号信</text>
</g>
<g class="c-amber">
<rect x="347" y="232" width="193" height="56" rx="10" stroke-width="0.5"/>
<text class="th" x="443" y="256" text-anchor="middle">UDP</text>
<text class="ts" x="443" y="273" text-anchor="middle">快但不保证 · 明信片</text>
</g>
<line x1="340" y1="289" x2="340" y2="301" stroke="var(--color-text-secondary)" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<g class="c-gray">
<rect x="140" y="302" width="400" height="44" rx="10" stroke-width="0.5"/>
<text class="th" x="340" y="322" text-anchor="middle">IP / 网络</text>
<text class="ts" x="340" y="337" text-anchor="middle">逐跳送到对面机器（见 03 / 04）</text>
</g>
</svg>
