<svg width="100%" viewBox="0 0 680 312" role="img" xmlns="http://www.w3.org/2000/svg">
<title>数据包逐跳转发：IP 不变，MAC 每跳重写</title>
<desc>数据包从你的电脑经家用路由器、骨干路由器、对端路由器到达目标主机。网络层 IP 头的目标 IP 全程为 203.0.113.5 保持不变；链路层帧头的目标 MAC 每经过一个路由器就被重写为下一跳的网卡地址。</desc>
<style>
svg{--color-text-primary:#1f2328;--color-text-secondary:#57606a;--color-border-secondary:#d0d7de;--color-text-info:#0969da;}
text{font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;}
.th{font-size:14px;font-weight:600;fill:#1f2328;}.ts{font-size:11px;fill:#57606a;}.t{font-size:13px;fill:#1f2328;}
.c-teal rect{fill:#d7f3ee;stroke:#0d9488;}.c-teal text{fill:#0f766e;}
.c-blue rect{fill:#dbeafe;stroke:#3b82f6;}.c-blue text{fill:#1d4ed8;}
.c-amber rect{fill:#fef3c7;stroke:#d97706;}.c-amber text{fill:#b45309;}
.c-gray rect{fill:#eef1f4;stroke:#9aa4af;}.c-gray text{fill:#3a424b;}
.c-coral rect{fill:#ffe4e0;stroke:#f97362;}.c-coral text{fill:#c0392b;}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="312" fill="#ffffff"/>
<g class="c-blue">
<rect x="40" y="42" width="600" height="44" rx="10" stroke-width="0.5"/>
<text class="th" x="340" y="63" text-anchor="middle">网络层 · IP 头部</text>
<text class="ts" x="340" y="80" text-anchor="middle">目标 IP = 203.0.113.5 —— 从头到尾全程不变</text>
</g>
<g class="c-teal">
<rect x="40" y="118" width="84" height="52" rx="10" stroke-width="0.5"/>
<text class="th" x="82" y="141" text-anchor="middle">你的电脑</text>
<text class="ts" x="82" y="157" text-anchor="middle">源头</text>
</g>
<g class="c-gray">
<rect x="169" y="118" width="84" height="52" rx="10" stroke-width="0.5"/>
<text class="th" x="211" y="141" text-anchor="middle">家用路由</text>
<text class="ts" x="211" y="157" text-anchor="middle">网关</text>
</g>
<g class="c-gray">
<rect x="298" y="118" width="84" height="52" rx="10" stroke-width="0.5"/>
<text class="th" x="340" y="141" text-anchor="middle">骨干路由</text>
<text class="ts" x="340" y="157" text-anchor="middle">互联网</text>
</g>
<g class="c-gray">
<rect x="427" y="118" width="84" height="52" rx="10" stroke-width="0.5"/>
<text class="th" x="469" y="141" text-anchor="middle">对端路由</text>
<text class="ts" x="469" y="157" text-anchor="middle">目标网段</text>
</g>
<g class="c-teal">
<rect x="556" y="118" width="84" height="52" rx="10" stroke-width="0.5"/>
<text class="th" x="598" y="141" text-anchor="middle">目标主机</text>
<text class="ts" x="598" y="157" text-anchor="middle">终点</text>
</g>
<line x1="124" y1="144" x2="167" y2="144" stroke="var(--color-text-secondary)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="253" y1="144" x2="296" y2="144" stroke="var(--color-text-secondary)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="382" y1="144" x2="425" y2="144" stroke="var(--color-text-secondary)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="511" y1="144" x2="554" y2="144" stroke="var(--color-text-secondary)" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="c-coral">
<rect x="40" y="196" width="141" height="42" rx="8" stroke-width="0.5"/>
<text class="th" x="110" y="217" text-anchor="middle">第 1 跳</text>
<text class="ts" x="110" y="232" text-anchor="middle">MAC → 家用路由</text>
</g>
<g class="c-coral">
<rect x="193" y="196" width="141" height="42" rx="8" stroke-width="0.5"/>
<text class="th" x="263" y="217" text-anchor="middle">第 2 跳</text>
<text class="ts" x="263" y="232" text-anchor="middle">MAC → 骨干路由</text>
</g>
<g class="c-coral">
<rect x="346" y="196" width="141" height="42" rx="8" stroke-width="0.5"/>
<text class="th" x="416" y="217" text-anchor="middle">第 3 跳</text>
<text class="ts" x="416" y="232" text-anchor="middle">MAC → 对端路由</text>
</g>
<g class="c-coral">
<rect x="499" y="196" width="141" height="42" rx="8" stroke-width="0.5"/>
<text class="th" x="569" y="217" text-anchor="middle">第 4 跳</text>
<text class="ts" x="569" y="232" text-anchor="middle">MAC → 目标主机</text>
</g>
<text class="ts" x="340" y="262" text-anchor="middle">同一个包 · 上方 IP 全程不变 · 下方 MAC 每过一个路由器就重写一次</text>
<g class="c-blue"><rect x="150" y="280" width="12" height="12" rx="2" stroke-width="0.5"/></g>
<text class="ts" x="168" y="290" text-anchor="start">蓝 = 网络层 IP（不变）</text>
<g class="c-coral"><rect x="370" y="280" width="12" height="12" rx="2" stroke-width="0.5"/></g>
<text class="ts" x="388" y="290" text-anchor="start">珊瑚 = 链路层 MAC（每跳变）</text>
</svg>
